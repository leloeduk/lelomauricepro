{% extends "base.html" %}

{% block content %}

<h1 class="text-4xl font-bold text-center mb-8">
    AI Assistant 🤖
</h1>

<div class="max-w-2xl mx-auto bg-gray-900 p-6 rounded-xl border border-gray-700">

    <!-- CHAT BOX -->
    <div id="chat-box" class="h-96 overflow-y-auto mb-4 space-y-3">

    </div>

    <!-- INPUT -->
    <div class="flex gap-2">
        <input id="message" type="text"
               class="w-full p-3 bg-gray-800 rounded"
               placeholder="Ask something...">

        <button onclick="sendMessage()"
                class="bg-blue-600 px-4 rounded hover:bg-blue-700">
            Send
        </button>
    </div>

</div>

<script>
function sendMessage() {
    let message = document.getElementById("message").value;

    fetch("/ai/chat/", {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded",
            "X-CSRFToken": getCookie("csrftoken")
        },
        body: "message=" + message
    })
    .then(res => res.json())
    .then(data => {
        let chatBox = document.getElementById("chat-box");

        chatBox.innerHTML += `
            <div class="text-right text-blue-400">You: ${message}</div>
            <div class="text-left text-gray-300">AI: ${data.response}</div>
        `;

        document.getElementById("message").value = "";
    });
}

// CSRF helper
function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i].trim();
            if (cookie.substring(0, name.length + 1) === (name + '=')) {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                break;
            }
        }
    }
    return cookieValue;
}
</script>

{% endblock %}
